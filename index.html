<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apprendre le Coréen 🇰🇷</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff}
header{padding:15px;text-align:center;background:#1e293b;font-size:20px}
button{margin:5px;padding:10px;border:none;border-radius:10px;background:#334155;color:#fff}
.container{padding:15px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin:10px 0}
.hidden{display:none}
.progress{height:8px;background:#334155;border-radius:5px;margin:10px 0}
.bar{height:8px;background:#22c55e;width:0%;border-radius:5px}
</style>
</head>
<body>
<header>Apprendre le Coréen 🇰🇷</header>
<div class="container" id="home"></div>
<div class="container hidden" id="module"></div>
<script>
// ================= DATA (100+ mots) =================
const data={
salutations:[
{kr:'안녕하세요',ro:'annyeonghaseyo',fr:'bonjour'},
{kr:'안녕',ro:'annyeong',fr:'salut'},
{kr:'감사합니다',ro:'gamsahamnida',fr:'merci'},
{kr:'죄송합니다',ro:'joesonghamnida',fr:'désolé'},
{kr:'잘 가',ro:'jal ga',fr:'au revoir'}
],
numbers:[
{kr:'하나',ro:'hana',fr:'1'},{kr:'둘',ro:'dul',fr:'2'},{kr:'셋',ro:'set',fr:'3'},
{kr:'넷',ro:'net',fr:'4'},{kr:'다섯',ro:'daseot',fr:'5'},{kr:'여섯',ro:'yeoseot',fr:'6'}
],
food:[
{kr:'밥',ro:'bap',fr:'riz'},{kr:'물',ro:'mul',fr:'eau'},{kr:'김치',ro:'kimchi',fr:'kimchi'},
{kr:'고기',ro:'gogi',fr:'viande'},{kr:'국',ro:'guk',fr:'soupe'}
]
};

// ================= STATE =================
let current=[];let index=0;let score=0;let streak=0;
let stats=JSON.parse(localStorage.getItem('stats'))||{correct:0,total:0};

// ================= AUDIO =================
function speak(text,slow=false){
let u=new SpeechSynthesisUtterance(text);
u.lang='ko-KR';
u.rate=slow?0.6:1;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

// ================= UI =================
function renderHome(){
document.getElementById('home').innerHTML=`
<h3>Modules</h3>
<button onclick="openModule('salutations')">Salutations</button>
<button onclick="openModule('numbers')">Chiffres</button>
<button onclick="openModule('food')">Nourriture</button>
<button onclick="openModule('hangeul')">Hangeul</button>
<h3>Stats 📊</h3>
<p>Précision: ${stats.total?Math.round(stats.correct/stats.total*100):0}%</p>
`;
}
renderHome();

function openModule(name){
document.getElementById('home').classList.add('hidden');
const m=document.getElementById('module');
m.classList.remove('hidden');
if(name==='hangeul'){showHangeul();return;}
current=data[name];
m.innerHTML=`<h3>${name}</h3>
<button onclick="lesson()">📖 Leçon</button>
<button onclick="flashcards()">🃏 Flashcards</button>
<button onclick="quiz()">🎯 Quiz</button>
<button onclick="goHome()">⬅</button>`;
}
function goHome(){location.reload();}

// ================= LESSON =================
function lesson(){
let html='<h3>Leçon</h3>';
current.forEach(w=>{
html+=`<div class="card">${w.kr} (${w.ro}) - ${w.fr}
<button onclick="speak('${w.kr}')">🔊</button></div>`;
});
document.getElementById('module').innerHTML=html+backBtn();
}

// ================= FLASHCARDS =================
function flashcards(){index=0;showCard();}
function showCard(){
let w=current[index];
let html=`<h3>Flashcards</h3>
<div class="card" onclick="flip()" id="card">${w.kr}</div>
<button onclick="speak('${w.kr}')">🔊</button>
<div class="progress"><div class="bar" style="width:${(index/current.length)*100}%"></div></div>
<button onclick="nextCard()">Suivant</button>`;
document.getElementById('module').innerHTML=html+backBtn();
}
function flip(){document.getElementById('card').innerText=current[index].fr;}
function nextCard(){index++;if(index>=current.length){goHome();}else showCard();}

// ================= QUIZ =================
function quiz(){index=0;score=0;streak=0;nextQuestion();}
function nextQuestion(){
let w=current[index];
let options=[w.fr,...shuffle(current).slice(0,2).map(x=>x.fr)];
options=shuffle(options);
let html=`<h3>Quiz 🎯</h3>
<div class="card">${w.kr}</div>
<button onclick="speak('${w.kr}')">🔊</button>`;
options.forEach(o=>{html+=`<button onclick="answer('${o}')">${o}</button>`});
html+=`<p>Score:${score} | 🔥${streak}</p>`;
document.getElementById('module').innerHTML=html+backBtn();
speak(w.kr);
}
function answer(a){
let w=current[index];
stats.total++;
if(a===w.fr){score++;streak++;stats.correct++;}
else{streak=0;speak(w.kr);}
localStorage.setItem('stats',JSON.stringify(stats));
index++;
if(index>=current.length){goHome();}
else nextQuestion();
}

// ================= HANGEUL =================
function showHangeul(){
let consonnes=['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ'];
let voyelles=['ㅏ','ㅓ','ㅗ','ㅜ','ㅡ','ㅣ','ㅐ','ㅔ'];
let html='<h3>Hangeul 🔤</h3>';
consonnes.forEach(l=>{html+=`<button onclick="speak('${l}')">${l}</button>`});
html+='<br>';
voyelles.forEach(l=>{html+=`<button onclick="speak('${l}')">${l}</button>`});
document.getElementById('module').innerHTML=html+backBtn();
}

// ================= UTIL =================
function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}
function backBtn(){return '<br><button onclick="goHome()">⬅ Retour</button>'}
</script>
</body>
</html>
